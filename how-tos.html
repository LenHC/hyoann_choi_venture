<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyoann Choi — Deep Tech Investor & Scientist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --text: #1a1a18;
      --muted: #6b6b67;
      --subtle: #b4b2a9;
      --border: #e0ded8;
      --accent: #0F6E56;
      --accent-light: #E1F5EE;
      --accent-text: #085041;
      --tag-bg: #f0efe9;
      --tag-active-bg: #1a1a18;
      --tag-active-text: #f7f6f2;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    /* ── Hero ── */
    .hero {
      max-width: 860px;
      margin: 0 auto;
      padding: 5rem 2.5rem 4rem;
    }

    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero-eyebrow::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: var(--accent);
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 400;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 1.5rem;
      max-width: 700px;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-bio {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.75;
      max-width: 560px;
      margin-bottom: 2rem;
    }

    .hero-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface);
    }

    /* ── Section ── */
    .section {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2.5rem 5rem;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
    }

    .section-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--subtle);
    }

    /* ── Tag Filters ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 2rem;
    }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--tag-bg);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .filter-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--tag-active-bg);
      color: var(--tag-active-text);
      border-color: var(--tag-active-bg);
    }

    /* ── Article Cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
    }

    .article-card:hover {
      border-color: var(--text);
      transform: translateY(-2px);
    }

    .article-card.hidden {
      display: none;
    }

    .card-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--subtle);
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: auto;
    }

    .card-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--tag-bg);
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .card-tag.industry {
      background: #E1F5EE;
      color: #085041;
    }

    .card-tag.funding {
      background: #EEEDFE;
      color: #3C3489;
    }

    .card-tag.legal {
      background: #FAEEDA;
      color: #633806;
    }

    .card-tag.regulatory {
      background: #FAECE7;
      color: #712B13;
    }

    .card-tag.strategy {
      background: #FBEAF0;
      color: #72243E;
    }

    .card-tag.markets {
      background: #E6F1FB;
      color: #0C447C;
    }

    .card-arrow {
      font-size: 16px;
      color: var(--subtle);
      align-self: flex-end;
      transition: color 0.15s, transform 0.15s;
    }

    .article-card:hover .card-arrow {
      color: var(--text);
      transform: translate(2px, -2px);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 860px;
      margin: 0 auto;
    }

    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--subtle);
    }

    .footer-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      nav {
        padding: 1rem 1.25rem;
      }

      .hero,
      .section {
        padding-left: 1.25rem;
        padding-right: 1.25rem;
      }

      .hero {
        padding-top: 3rem;
      }

      .nav-links {
        gap: 1rem;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a class="nav-logo" href="index.html">Hyoann Choi</a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="how-tos.html">Founder HOW-TOs</a></li>
      <li><a href="mailto:you@email.com">Contact</a></li>
    </ul>
  </nav>

  <!-- ── FOUNDER HOW-TOs ─────────────────────────── -->
  <section class="section" id="howtos" style="padding-top: 5rem;">
    <div class="section-header">
      <h2 class="section-title">Founder HOW-TOs</h2>
      <span class="section-count" id="card-count"></span>
    </div>

    <!-- Tag filter buttons — auto-generated from article data below -->
    <div class="filters" id="filters"></div>

    <!-- Article cards — auto-generated from the ARTICLES array in the script -->
    <div class="cards-grid" id="cards-grid"></div>
  </section>

  <footer>
    <span class="footer-text">© 2025 Hyoann Choi</span>
  </footer>

  <script>
    // ════════════════════════════════════════════════
    // ✏️  ARTICLE DATABASE
    // To add a new article: copy one object, update all fields, add the HTML file to /Founder HOW-TOs/
    // Tags: use existing tag types (industry, funding, legal, regulatory, strategy, markets)
    //       or add new ones and update the CSS .card-tag styles above
    // ════════════════════════════════════════════════
    const ARTICLES = [
      {
        num: "01",
        title: "Healthcare has three different buyers — and they're rarely the same person",
        desc: "User, customer, and payer are distinct roles in healthcare. Know who you're selling to, who writes the check, and who approves coverage.",
        file: "Founder HOW-TOs/01-healthcare-stakeholders.html",
        tags: [
          { label: "Healthcare", type: "industry" },
          { label: "Go-to-market", type: "strategy" },
          { label: "Markets", type: "markets" }
        ]
      },
      {
        num: "02",
        title: "Not all funding is the same — some costs you equity, some just costs you time",
        desc: "Dilutive vs. non-dilutive capital explained. Why deep tech founders should exhaust SBIR/STTR before their first equity round.",
        file: "Founder HOW-TOs/02-dilutive-nondilutive-funding.html",
        tags: [
          { label: "Funding", type: "funding" },
          { label: "SBIR/STTR", type: "funding" },
          { label: "Strategy", type: "strategy" }
        ]
      },
      {
        num: "03",
        title: "Patents protect your moat — but only if you file at the right time",
        desc: "Provisional vs. non-provisional patents, freedom to operate analysis, and the typical university patent timeline from discovery to spin-out.",
        file: "Founder HOW-TOs/03-patent-strategy.html",
        tags: [
          { label: "IP / Legal", type: "legal" },
          { label: "Tech transfer", type: "strategy" },
          { label: "University", type: "industry" }
        ]
      },
      {
        num: "04",
        title: "Your FDA pathway determines your timeline, your data needs, and your fundraise",
        desc: "510(k), De Novo, and PMA explained. How investors price regulatory risk and why your FDA class matters on day one.",
        file: "Founder HOW-TOs/04-regulatory-pathways.html",
        tags: [
          { label: "Regulatory", type: "regulatory" },
          { label: "Medtech", type: "industry" },
          { label: "FDA", type: "regulatory" }
        ]
      },
      {
        num: "05",
        title: "Investors fund people and markets first — your technology is third",
        desc: "The six questions every investor meeting is really answering. What to lead with, what to never say, and how to structure your ask.",
        file: "Founder HOW-TOs/05-communicating-investors.html",
        tags: [
          { label: "Fundraising", type: "funding" },
          { label: "Pitch strategy", type: "strategy" },
          { label: "Investors", type: "markets" }
        ]
      }
      // ✏️ ADD MORE ARTICLES HERE — copy the object above and paste below
    ];

    // ════════════════════════════════════════════════
    // Rendering logic — no need to edit below
    // ════════════════════════════════════════════════
    let activeFilter = "all";

    function getAllTagTypes() {
      const types = new Set();
      ARTICLES.forEach(a => a.tags.forEach(t => types.add(t.type)));
      return Array.from(types);
    }

    function buildFilters() {
      const container = document.getElementById("filters");
      const types = getAllTagTypes();
      const labels = {
        industry: "Industry", funding: "Funding", legal: "Legal / IP",
        regulatory: "Regulatory", strategy: "Strategy", markets: "Markets"
      };

      const allBtn = document.createElement("button");
      allBtn.className = "filter-btn active";
      allBtn.textContent = "All";
      allBtn.dataset.filter = "all";
      allBtn.addEventListener("click", () => setFilter("all"));
      container.appendChild(allBtn);

      types.forEach(type => {
        const btn = document.createElement("button");
        btn.className = "filter-btn";
        btn.textContent = labels[type] || type;
        btn.dataset.filter = type;
        btn.addEventListener("click", () => setFilter(type));
        container.appendChild(btn);
      });
    }

    function setFilter(filter) {
      activeFilter = filter;
      document.querySelectorAll(".filter-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.filter === filter);
      });
      renderCards();
    }

    function renderCards() {
      const grid = document.getElementById("cards-grid");
      grid.innerHTML = "";
      const filtered = activeFilter === "all"
        ? ARTICLES
        : ARTICLES.filter(a => a.tags.some(t => t.type === activeFilter));

      document.getElementById("card-count").textContent = `${filtered.length} article${filtered.length !== 1 ? "s" : ""}`;

      filtered.forEach(a => {
        const card = document.createElement("a");
        card.className = "article-card";
        card.href = a.file;
        card.innerHTML = `
        <span class="card-num">No. ${a.num}</span>
        <h3 class="card-title">${a.title}</h3>
        <p class="card-desc">${a.desc}</p>
        <div class="card-tags">${a.tags.map(t => `<span class="card-tag ${t.type}">${t.label}</span>`).join("")}</div>
        <span class="card-arrow">↗</span>
      `;
        grid.appendChild(card);
      });
    }

    buildFilters();
    renderCards();
  </script>
</body>

</html>
